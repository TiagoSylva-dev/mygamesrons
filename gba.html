<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Emulador GBA</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Pega o nome do jogo no link
        const urlParams = new URLSearchParams(window.location.search);
        const romName = urlParams.get('rom');

        if (romName) {
            window.EJS_player = '#game';
            window.EJS_core = 'gba'; // Motor do Game Boy Advance
            window.EJS_gameUrl = `roms/gba/${romName}.zip`; // Pasta do GBA
            window.EJS_pathtodata = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/';
            
            // Inicia direto sem o botão azul
            window.EJS_startOnLoaded = true; 
            window.EJS_Buttons = true; // Botões para celular
            
            // Sistema de Save (cria um save diferente para cada jogo)
            window.EJS_onSaveState = function(state) {
                localStorage.setItem('save_gba_' + romName, state);
            };
            window.EJS_onLoadState = function() {
                return localStorage.getItem('save_gba_' + romName);
            };

            const script = document.createElement('script');
            script.src = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js';
            document.body.appendChild(script);
        } else {
            document.getElementById('game').innerHTML = '<h3 style="color:white; text-align:center; font-family:sans-serif; margin-top:50px;">Erro: Faltou o nome do jogo no link!</h3>';
        }
    </script>
</body>
</html>
