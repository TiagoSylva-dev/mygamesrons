<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Emulador GBA</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romName = urlParams.get('rom');

        if (romName) {
            EJS_player = '#game';
            EJS_core = 'gba'; 
            EJS_gameUrl = 'roms/gba/' + romName + '.zip'; // Confirme se a pasta no GitHub é exatamente roms/gba/
            EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/'; // SERVIDOR CORRIGIDO
            
            EJS_startOnLoaded = true; 
            EJS_Buttons = true; 
            
            EJS_onSaveState = function(state) {
                localStorage.setItem('save_gba_' + romName, state);
            };
            EJS_onLoadState = function() {
                return localStorage.getItem('save_gba_' + romName);
            };

            let script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js'; // SERVIDOR CORRIGIDO
            document.body.appendChild(script);
        } else {
            document.getElementById('game').innerHTML = '<h3 style="color:white; text-align:center; font-family:sans-serif; margin-top:50px;">Erro: Faltou o nome do jogo no link!</h3>';
        }
    </script>
</body>
</html>
