<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Emulador</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; }
        #game { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; color: white; }
    </style>
</head>
<body>
    <div id="game">Carregando o cartucho...</div>

    <script>
        // 1. O código "lê" o link que a Tag NFC enviou
        const parametros = new URLSearchParams(window.location.search);
        const nomeDoJogo = parametros.get('rom'); // Pega o nome do zip (ex: pokemon)
        const consoleDoJogo = parametros.get('core'); // Pega o console (ex: gba)

        // 2. Verifica se a pessoa tentou abrir sem um cartucho NFC
        if (!nomeDoJogo || !consoleDoJogo) {
            document.getElementById('game').innerHTML = "<h2>Por favor, aproxime um cartucho NFC!</h2>";
        } else {
            // 3. Se tiver o jogo no link, ele monta o emulador
            EJS_player = '#game';
            EJS_core = consoleDoJogo; 
            EJS_gameName = nomeDoJogo.toUpperCase(); 
            EJS_color = '#4b0082'; 
            EJS_startOnLoaded = true; 
            EJS_Buttons = true; 
            EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/';
            
            // Ele junta a palavra 'roms/' + o nome do jogo + '.zip'
            EJS_gameUrl = 'roms/' + nomeDoJogo + '.zip'; 

            // Sistema de Save Inteligente (salva com o nome exato do jogo)
            EJS_onSaveState = function(state) {
                localStorage.setItem('save_' + nomeDoJogo, state);
            };
            EJS_onLoadState = function() {
                return localStorage.getItem('save_' + nomeDoJogo);
            };

            // Carrega o emulador na tela
            let script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js";
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
