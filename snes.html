<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Emulador SNES</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Pega apenas o nome do jogo na URL
        const urlParams = new URLSearchParams(window.location.search);
        const romName = urlParams.get('rom');

        if (romName) {
            window.EJS_player = '#game';
            window.EJS_core = 'snes'; // MOTOR FIXO PARA SNES
            window.EJS_gameUrl = `roms/snes/${romName}.zip`; // PASTA FIXA PARA SNES
            window.EJS_pathtodata = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/';
            
            const script = document.createElement('script');
            script.src = 'https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js';
            document.body.appendChild(script);
        } else {
            document.getElementById('game').innerHTML = '<h3 style="color:white; text-align:center; font-family:sans-serif; margin-top:50px;">Erro: Faltou o nome do jogo no link!</h3>';
        }
    </script>
</body>
</html>
