<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Emulador - Teste</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        EJS_player = '#game';
        EJS_core = 'gba'; 
        EJS_gameName = 'Pokemon Fire Red'; 
        EJS_color = '#4b0082'; // O layout roxo que você pediu
        EJS_startOnLoaded = true; 
        EJS_Buttons = true; 
        EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/';
        
        // Nome exato do arquivo que está no seu repositório
        EJS_gameUrl = 'Pokemon Fire Red Version BR.gba'; 
    </script>
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@main/data/loader.js"></script>
</body>
</html>
